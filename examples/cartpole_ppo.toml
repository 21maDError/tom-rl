# ─────────────────────────────────────────────────────────
# CartPole  ×  PPO  (actor-critic, GAE, clipped surrogate)
# ─────────────────────────────────────────────────────────

[environment]
name      = "cartpole"
max_steps = 500
seed      = 42

[network]
hidden_layers = [128, 64]
activation    = "tanh"

[algorithm]
name          = "ppo"
gamma         = 0.99
learning_rate = 3e-4
optimizer     = "adam"

[algorithm.ppo]
clip_epsilon     = 0.2
epochs           = 4
batch_size       = 64
steps_per_update = 512
gae_lambda       = 0.95
entropy_coef     = 0.01
value_coef       = 0.5

[training]
episodes      = 500
log_interval  = 10
eval_interval = 50
eval_episodes = 5
save_best     = true
target_reward = 470.0

[output]
model_path  = "./models/cartpole_ppo"
format      = "json"
print_curve = true
