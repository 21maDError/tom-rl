# ─────────────────────────────────────────────────────────
# GridWorld  ×  PPO  (6×6 grid, 10% obstacles)
# Goal: navigate from (0,0) to (5,5) avoiding obstacles
# ─────────────────────────────────────────────────────────

[environment]
name              = "gridworld"
max_steps         = 200
seed              = 7
grid_size         = [6, 6]
obstacle_fraction = 0.10

[network]
hidden_layers = [64, 64]
activation    = "tanh"

[algorithm]
name          = "ppo"
gamma         = 0.99
learning_rate = 3e-4
optimizer     = "adam"

[algorithm.ppo]
clip_epsilon     = 0.2
epochs           = 4
batch_size       = 32
steps_per_update = 256
gae_lambda       = 0.95
entropy_coef     = 0.05
value_coef       = 0.5

[training]
episodes      = 400
log_interval  = 10
eval_interval = 50
eval_episodes = 5
save_best     = true

[output]
model_path  = "./models/gridworld_ppo"
format      = "json"
print_curve = true
